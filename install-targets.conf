# Install target mappings.
# Format: target|skills_dest|workflow_docs_dest
# `install.sh` installs ControlFlow templates, references, and skills only.
# Human-facing docs stay in docs/ and are not copied to agent directories.
# Templates and references are installed to a stable path so installed skills
# can find them outside this repository checkout.
# Use ~ for HOME. Optional workflow_docs_dest installs workflow docs.
# Default mode is copy. Override per run with --mode symlink.

# Shared Agent Skills path. Verified for OpenCode, Codex, Cursor,
# Devin Desktop/Windsurf, and Antigravity. Hermes can use this path when
# listed under skills.external_dirs in profile config.
# GitHub Copilot support is not verified here.
agents|~/.agents/skills|~/.agents/controlflow

# Claude Code docs: personal skills are read from ~/.claude/skills.
# Templates and references are installed to the shared ControlFlow path.
claude|~/.claude/skills|~/.agents/controlflow
